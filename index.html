<style>

:root{

html{background:var(--bg);-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100dvh;overscroll-behavior:none}

.bar-time{font-size:12px;color:var(--t3);letter-spacing:.04em}
.hero{padding:40px 20px 28px}

.greeting em{font-style:italic;color:var(--gold)}
.dateline{font-size:11px;color:var(--t3);margin-top:9px;letter-spacing:.09em;text-transform:uppercase}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 20px 28px}
.met{background:var(--surf);border:0.5px solid var(--b1);border-radius:var(--rs);padding:11px 13px}
.met-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.met-v{font-size:19px;font-weight:500;color:var(--t1)}
.main{padding:0 20px calc(36px + var(--sb))}
.sec{margin-bottom:22px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.sec-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;font-weight:500;display:flex;align-items:center;gap:6px}
.sec-lbl::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;display:inline-block}
.rbtn{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--t3);background:transparent;border:0.5px solid var(--b1);border-radius:20px;padding:5px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.rbtn:active{background:var(--surf2)}
.card{background:var(--surf);border:0.5px solid var(--b1);border-radius:var(--r);padding:17px 19px}
.card-gold{border-color:rgba(201,168,76,0.2)}
.ld{font-size:13px;color:var(--t3)}
.err{font-size:13px;color:var(--red);line-height:1.6}
.wx-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.wx-temp{font-family:'DM Serif Display',serif;font-size:40px;color:var(--t1);line-height:1}
.wx-desc{font-size:13px;color:var(--t2);margin-top:4px}
.wx-dets{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:2px}
.wx-d{font-size:12px;color:var(--t3)}
.wx-d b{color:var(--t2);font-weight:400}
.ev-list{display:flex;flex-direction:column}
.ev{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:0.5px solid var(--b1)}
.ev:last-of-type{border-bottom:none;padding-bottom:0}
.ev:first-of-type{padding-top:0}
.ev-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:5px}
.ev-info{flex:1}
.ev-title{font-size:14px;color:var(--t1);line-height:1.4}
.ev-time{font-size:12px;color:var(--t3);margin-top:2px}
.no-ev{font-size:13px;color:var(--t3)}
.briefing{font-size:14px;color:var(--t2);line-height:1.85}
.verse{font-family:'DM Serif Display',serif;font-size:17px;color:var(--t1);line-height:1.65;font-style:italic}
.verse-ref{font-size:13px;color:var(--gold);margin-top:11px}
.verse-src{font-size:10px;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.challenge{font-size:15px;color:var(--t1);line-height:1.55;font-weight:500}
.challenge-tip{font-size:13px;color:var(--t2);margin-top:9px;line-height:1.7}
.tag{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;margin-top:12px;background:rgba(201,168,76,0.09);color:var(--gold2);border:0.5px solid rgba(201,168,76,0.22);letter-spacing:.07em;text-transform:uppercase}

.quote-by{font-size:13px;color:var(--t3);margin-top:9px}
.todos{display:flex;flex-direction:column;gap:9px;margin-bottom:13px}
.ti{display:flex;align-items:center;gap:11px}
.tck{width:20px;height:20px;border-radius:6px;border:0.5px solid var(--b2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

.tlbl{font-size:14px;color:var(--t1);flex:1;line-height:1.4;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.tlbl.done{text-decoration:line-through;color:var(--t3)}
.tdel{font-size:20px;color:var(--t3);background:none;border:none;cursor:pointer;padding:3px 7px;line-height:1;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.tadd{display:flex;gap:8px}
.tadd input{flex:1;font-family:'DM Sans',sans-serif;font-size:16px;background:var(--surf2);border:0.5px solid var(--b1);border-radius:var(--rs);padding:10px 13px;color:var(--t1);outline:none;-webkit-appearance:none}
.tadd input::placeholder{color:var(--t3)}
.tadd button{font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 15px;border-radius:var(--rs);border:0.5px solid rgba(201,168,76,0.32);background:rgba(201,168,76,0.07);color:var(--gold2);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tadd button:active{background:rgba(201,168,76,0.16)}
@keyframes up{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.hero{animation:up .4s ease both}
.metrics{animation:up .4s .07s ease both}
.sec:nth-child(1){animation:up .4s .11s ease both}
.sec:nth-child(2){animation:up .4s .16s ease both}
.sec:nth-child(3){animation:up .4s .20s ease both}
.sec:nth-child(4){animation:up .4s .24s ease both}
.sec:nth-child(5){animation:up .4s .28s ease both}
.sec:nth-child(6){animation:up .4s .32s ease both}
.sec:nth-child(7){animation:up .4s .36s ease both}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
</style>
</head>
<body>
<div class="bar">
  <div class="bar-l"><div class="dot"></div><div class="bar-title">Morning Briefing</div></div>
  <div class="bar-time" id="clock"></div>
</div>
<div class="hero">
  <div class="greeting" id="greeting">Good morning, <em>Ethan</em></div>
  <div class="dateline" id="dateline"></div>
</div>
<div class="metrics">

  <div class="met"><div class="met-l">Tasks</div><div class="met-v" id="m-tasks">—</div></div>
</div>
<div class="main">
  <div class="sec">
    <div class="sec-hd"><div class="sec-lbl">Weather — Nampa, ID</div><button class="rbtn" onclick="loadWeather()">↻ refresh</button></div>
    <div class="card"><div id="wx" class="ld">Loading weather...</div></div>
  </div>
  <div class="sec">
    <div class="sec-hd"><div class="sec-lbl">Today's calendar</div><button class="rbtn" onclick="loadCalendar()">↻ refresh</button></div>
    <div class="card"><div id="cal" class="ld">Loading events...</div></div>
  </div>
  <div class="sec">
    <div class="sec-hd"><div class="sec-lbl">Morning briefing</div><button class="rbtn" onclick="renderBriefing()">↻ refresh</button></div>
    <div class="card"><div id="briefing" class="ld">Loading...</div></div>
  </div>
  <div class="sec">
    <div class="sec-hd"><div class="sec-lbl">Verse of the day — ESV</div><button class="rbtn" onclick="nextVerse()">↻ new verse</button></div>
    <div class="card card-gold"><div id="verse"></div></div>
  </div>
  <div class="sec">
    <div class="sec-hd"><div class="sec-lbl">Daily creative challenge</div><button class="rbtn" onclick="nextChallenge()">↻ new prompt</button></div>
    <div class="card"><div id="challenge"></div></div>
  </div>
  <div class="sec">
    <div class="sec-hd"><div class="sec-lbl">Quote of the day</div><button class="rbtn" onclick="nextQuote()">↻ new quote</button></div>
    <div class="card"><div id="quote"></div></div>
  </div>
  <div class="sec">
    <div class="sec-hd"><div class="sec-lbl">Quick to-do</div><button class="rbtn" onclick="clearDone()">✕ clear done</button></div>
    <div class="card">
      <div class="todos" id="todos"></div>
      <div class="tadd">
        <input id="ti" type="text" placeholder="Add a task..." autocomplete="off" autocorrect="off" onkeydown="if(event.key==='Enter')addTodo()"/>
        <button onclick="addTodo()">+ Add</button>
      </div>
    </div>
  </div>
</div>

  "New day. {wx} in Nampa. {events}. Your creative instincts are sharper than you think. Trust them more today.",
  "Up and at it. It's {wx} outside — {events}. Progress doesn't always feel like progress in the moment. Keep going anyway.",
  "Good morning. {wx} skies today and {events}. BSU, Innovation & Design, filmmaking — you chose all of this. Own it completely.",
  "Today: {wx}, {events}. The version of you six months from now will be grateful you didn't quit on a day like today."
];

let wxData = null;
let calEvents = [];
let todos = [];
const day = new Date().getDate();
const doy = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0))/86400000);
let verseIdx = doy % VERSES.length;
let challengeIdx = doy % CHALLENGES.length;
let quoteIdx = doy % QUOTES.length;
let briefingIdx = doy % BRIEFINGS.length;

try { todos = JSON.parse(localStorage.getItem('em_todos')||'[]'); } catch(e){todos=[];}

function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function initHeader(){
  const h=new Date().getHours();
  const g=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  document.getElementById('greeting').innerHTML=`${g}, <em>Ethan</em>`;
  document.getElementById('dateline').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

async function loadWeather(){
  document.getElementById('wx').innerHTML='<div class="ld">Loading weather...</div>';
  try{
    const d=await fetch(WX_URL).then(r=>r.json());
    wxData=d;
    const c=d.current,dy=d.daily;
    document.getElementById('m-temp').textContent=Math.round(c.temperature_2m)+'°F';
    document.getElementById('wx').innerHTML=`
      <div class="wx-row">
        <div>
          <div class="wx-temp">${Math.round(c.temperature_2m)}°F</div>
          <div class="wx-desc">${WX_CODES[c.weathercode]||'Unknown'}</div>
        </div>
        <div class="wx-dets">
          <div class="wx-d">High <b>${Math.round(dy.temperature_2m_max[0])}°</b></div>
          <div class="wx-d">Low <b>${Math.round(dy.temperature_2m_min[0])}°</b></div>
          <div class="wx-d">Humidity <b>${c.relativehumidity_2m}%</b></div>
          <div class="wx-d">Wind <b>${Math.round(c.windspeed_10m)} mph</b></div>
          <div class="wx-d">Rain <b>${dy.precipitation_probability_max[0]}%</b></div>
        </div>
      </div>`;
    renderBriefing();
  }catch(e){
    document.getElementById('wx').innerHTML='<div class="err">Could not load weather.</div>';
  }
}

function getTimezoneOffset(tz,date){
  try{
    const u=new Date(date.toLocaleString('en-US',{timeZone:'UTC'}));
    const t=new Date(date.toLocaleString('en-US',{timeZone:tz}));
    return(u-t)/60000;
  }catch(e){return 0;}
}

function parseIcal(text){
  const events=[];
  const blocks=text.split('BEGIN:VEVENT');
  const nowMT=new Date().toLocaleDateString('en-CA',{timeZone:'America/Denver'}).replace(/-/g,'');
  for(let i=1;i<blocks.length;i++){
    const b=blocks[i];
    const getVal=key=>{const m=b.match(new RegExp('(?:^|\\n)'+key+'[^:]*:([^\\n]+)','i'));return m?m[1].replace(/\r/g,'').trim():'';};
    const summary=getVal('SUMMARY');
    const dtstart=getVal('DTSTART');
    const tzid=(b.match(/DTSTART;TZID=([^:]+):/)||[])[1]||'';
    if(!summary||!dtstart)continue;
    let eventDateStr='',timeStr='All day';
    if(dtstart.includes('T')){
      let eventDate;
      if(dtstart.endsWith('Z')){
        const yr=dtstart.slice(0,4),mo=dtstart.slice(4,6),dy=dtstart.slice(6,8),hr=dtstart.slice(9,11),mn=dtstart.slice(11,13),sc=dtstart.slice(13,15);
        eventDate=new Date(`${yr}-${mo}-${dy}T${hr}:${mn}:${sc}Z`);
      }else if(tzid){
        const bare=dtstart.replace(/.*:/,'');
        const yr=bare.slice(0,4),mo=bare.slice(4,6),dy=bare.slice(6,8),hr=bare.slice(9,11),mn=bare.slice(11,13);
        eventDate=new Date(`${yr}-${mo}-${dy}T${hr}:${mn}:00`);
        const tzOff=getTimezoneOffset(tzid,eventDate);
        const mtOff=getTimezoneOffset('America/Denver',eventDate);
        eventDate=new Date(eventDate.getTime()+(tzOff-mtOff)*60000);
      }else{
        const bare=dtstart.replace(/.*:/,'');
        const yr=bare.slice(0,4),mo=bare.slice(4,6),dy=bare.slice(6,8),hr=bare.slice(9,11),mn=bare.slice(11,13);
        eventDate=new Date(`${yr}-${mo}-${dy}T${hr}:${mn}:00`);
      }
      eventDateStr=eventDate.toLocaleDateString('en-CA',{timeZone:'America/Denver'}).replace(/-/g,'');
      timeStr=eventDate.toLocaleTimeString('en-US',{timeZone:'America/Denver',hour:'numeric',minute:'2-digit'});
    }else{
      eventDateStr=dtstart.replace(/.*:/,'').slice(0,8);
    }
    if(eventDateStr!==nowMT)continue;
    events.push({title:summary,time:timeStr});
  }
  events.sort((a,b)=>{
    if(a.time==='All day')return -1;
    if(b.time==='All day')return 1;
    return new Date('1970/01/01 '+a.time)-new Date('1970/01/01 '+b.time);
  });
  return events;
}

async function loadCalendar(){
  document.getElementById('cal').innerHTML='<div class="ld">Loading events...</div>';
  try{
    const resp=await fetch(WORKER+'/calendar');
    if(!resp.ok)throw new Error('fetch failed');
    const text=await resp.text();
    calEvents=parseIcal(text);
    document.getElementById('m-events').textContent=calEvents.length;
    if(!calEvents.length){
      document.getElementById('cal').innerHTML='<div class="no-ev">No events today — enjoy the free day.</div>';
    }else{
      document.getElementById('cal').innerHTML=`<div class="ev-list">${calEvents.map(e=>`
        <div class="ev">
          <div class="ev-dot"></div>
          <div class="ev-info">
            <div class="ev-title">${e.title}</div>
            <div class="ev-time">${e.time}</div>
          </div>
        </div>`).join('')}</div>`;
    }
    renderBriefing();
  }catch(e){
    document.getElementById('cal').innerHTML='<div class="err">Could not load calendar — tap refresh to retry.</div>';
    document.getElementById('m-events').textContent='—';
    renderBriefing();
  }
}

function renderBriefing(){
  const wx=wxData?`${Math.round(wxData.current.temperature_2m)}°F and ${(WX_CODES[wxData.current.weathercode]||'clear').toLowerCase()}`:'looking good';
  const evStr=calEvents.length===0?'you\'ve got a free day':calEvents.length===1?`you\'ve got ${calEvents[0].title} at ${calEvents[0].time}`:`you\'ve got ${calEvents.length} things on the calendar`;
  let text=BRIEFINGS[briefingIdx];
  text=text.replace('{wx}',wx).replace('{events}',evStr);
  document.getElementById('briefing').innerHTML=`<div class="briefing">${text}</div>`;
}

function renderVerse(){
  const v=VERSES[verseIdx%VERSES.length];
  document.getElementById('verse').innerHTML=`
    <div class="verse">"${v.v}"</div>
    <div class="verse-ref">${v.r}</div>
    <div class="verse-src">English Standard Version · BibleGateway</div>`;
}
function nextVerse(){verseIdx++;renderVerse();}

function renderChallenge(){
  const c=CHALLENGES[challengeIdx%CHALLENGES.length];
  document.getElementById('challenge').innerHTML=`
    <div class="challenge">${c.c}</div>
    <div class="challenge-tip">${c.t}</div>
    <div class="tag">${c.cat}</div>`;
}
function nextChallenge(){challengeIdx++;renderChallenge();}

function renderQuote(){
  const q=QUOTES[quoteIdx%QUOTES.length];
  document.getElementById('quote').innerHTML=`<div class="quote">"${q.q}"</div><div class="quote-by">— ${q.a}</div>`;
}
function nextQuote(){quoteIdx++;renderQuote();}

function saveTodos(){localStorage.setItem('em_todos',JSON.stringify(todos));document.getElementById('m-tasks').textContent=todos.filter(t=>!t.done).length;}
function renderTodos(){
  const el=document.getElementById('todos');
  if(!todos.length){el.innerHTML='<div class="no-ev">No tasks yet.</div>';return;}
  el.innerHTML=todos.map((t,i)=>`
    <div class="ti">
      <div class="tck ${t.done?'done':''}" onclick="toggleTodo(${i})"></div>
      <div class="tlbl ${t.done?'done':''}" onclick="toggleTodo(${i})">${t.text}</div>
      <button class="tdel" onclick="delTodo(${i})">×</button>
    </div>`).join('');
  document.getElementById('m-tasks').textContent=todos.filter(t=>!t.done).length;
}
function toggleTodo(i){todos[i].done=!todos[i].done;saveTodos();renderTodos();}
function delTodo(i){todos.splice(i,1);saveTodos();renderTodos();}
function clearDone(){todos=todos.filter(t=>!t.done);saveTodos();renderTodos();}
function addTodo(){
  const el=document.getElementById('ti');
  const v=el.value.trim();if(!v)return;
  todos.push({text:v,done:false});el.value='';
  saveTodos();renderTodos();
}

initHeader();tick();setInterval(tick,10000);
renderTodos();renderVerse();renderChallenge();renderQuote();
loadWeather();
loadCalendar();
</script>
</body>
</html>
